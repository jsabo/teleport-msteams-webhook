version: 2

project_name: teleport-msteams-webhook

builds:
  - id: teleport-msteams-webhook
    main: ./cmd/teleport-msteams-webhook
    binary: teleport-msteams-webhook
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "teleport-msteams-webhook_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - assets/teleport-logo.png
      - deploy/systemd/*

checksum:
  name_template: checksums.txt
  algorithm: sha256

release:
  github:
    owner: jsabo
    name: teleport-msteams-webhook
  draft: false
  prerelease: auto
  name_template: "teleport-msteams-webhook {{.Tag}}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
