name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub Release and upload artifacts
      packages: write   # push OCI image and Helm chart to GHCR

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jsabo/teleport-msteams-webhook:${{ github.ref_name }}
            ghcr.io/jsabo/teleport-msteams-webhook:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/teleport-msteams-webhook \
            --version "${VERSION}" \
            --app-version "${VERSION}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "teleport-msteams-webhook-${VERSION}.tgz" oci://ghcr.io/jsabo/charts
