name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # create GitHub Release and upload artifacts
      packages: write   # push Helm chart to GHCR

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package deploy/helm/teleport-msteams-webhook \
            --version "${VERSION}" \
            --app-version "${VERSION}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "teleport-msteams-webhook-${VERSION}.tgz" oci://ghcr.io/jsabo/charts
