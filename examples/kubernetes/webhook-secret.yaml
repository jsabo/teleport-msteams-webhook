apiVersion: v1
kind: Secret
metadata:
  name: teleport-msteams-webhook-secrets
  namespace: teleport-plugins
stringData:
  # Paste your Teams incoming webhook URL here.
  # Create one: Teams channel → ··· → Workflows → "Post to a channel when a webhook request is received"
  # Add additional keys (e.g. TEAMS_WEBHOOK_DEV) and reference them with "env:KEY" in values.yaml.
  TEAMS_WEBHOOK_GENERAL: "https://prod.westus2.logic.azure.com/workflows/REPLACE_ME"
