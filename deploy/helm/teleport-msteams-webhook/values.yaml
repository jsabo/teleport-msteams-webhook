replicaCount: 1

image:
  repository: ghcr.io/jsabo/teleport-msteams-webhook
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

tbot:
  image:
    repository: public.ecr.aws/gravitational/tbot-distroless
    tag: "17"  # pin to a specific Teleport version in production
    pullPolicy: IfNotPresent
    # Override the container entrypoint. Only needed if using a non-standard image.
    command: []

  # Address of your Teleport Auth or Proxy server.
  teleportAddr: "teleport.example.com:443"

  # Join method for tbot. "kubernetes" uses the pod's service account JWT.
  # See: https://goteleport.com/docs/reference/deployment/join-methods/
  joinMethod: kubernetes

  # Name of the Teleport Bot resource (must match the ProvisionToken's bot_name).
  botName: msteams-webhook

  # Name of the ProvisionToken for the Kubernetes join method.
  token: ""

teleport:
  # Address of your Teleport Proxy (host:port) — also used by the plugin to connect.
  addr: "teleport.example.com:443"

config:
  log:
    severity: info

  msteams:
    # Defaults to the Teleport brand logo in the GitHub repo.
    logoURL: ""
    disableLogo: false

  # Name of a Kubernetes Secret whose keys are injected as env vars into the
  # plugin container. Use "env:KEY" references in roleToRecipients to read URLs
  # from the Secret without embedding them in the ConfigMap.
  webhookSecretName: ""

  # Map Teleport roles to Teams incoming webhook URLs.
  # Any role not listed falls back to the "*" wildcard.
  # Example:
  # roleToRecipients:
  #   "dev": ["https://prod.westus2.logic.azure.com/.../dev"]
  #   "*":   ["env:TEAMS_WEBHOOK_GENERAL"]
  roleToRecipients: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Extra volumes and mounts for the plugin container — use with "file:/path"
# references in roleToRecipients to mount a Secret as a file.
# Example: mount a Secret key at /run/secrets/teams-webhook-general
#
# extraVolumes:
#   - name: webhook-secrets
#     secret:
#       secretName: my-teams-webhooks
#
# extraVolumeMounts:
#   - name: webhook-secrets
#     mountPath: /run/secrets
#     readOnly: true

extraVolumes: []
extraVolumeMounts: []
